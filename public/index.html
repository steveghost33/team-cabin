<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D4A017" />
    <title>Team Cabin</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="%PUBLIC_URL%/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/favicon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bebas+Neue&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Reset ── */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      /* ── Base ── */
      body {
        background: #2D4A1E;
        color: #F5F0DC;
        font-family: 'Bebas Neue', sans-serif;
        overflow-x: hidden;
      }

      /* ── Scanline overlay ── */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,0,0,0.07) 3px,
          rgba(0,0,0,0.07) 4px
        );
        pointer-events: none;
        z-index: 9000;
      }

      #root { min-height: 100vh; }

      /* ── Animations (referenced by inline styles via animation: name) ── */
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-10px); }
      }
      @keyframes glow {
        0%, 100% { text-shadow: 4px 4px 0 #2D4A1E, 8px 8px 0 #000; }
        50%       { text-shadow: 4px 4px 0 #2D4A1E, 8px 8px 0 #000, 0 0 30px #D4A017, 0 0 60px #ffcc00; }
      }
      @keyframes blink  { 50% { opacity: 0; } }
      @keyframes float  {
        0%, 100% { transform: translateY(0) rotate(-1deg); }
        50%       { transform: translateY(-12px) rotate(1deg); }
      }
      @keyframes marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
