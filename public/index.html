<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team Cabin</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        background: #1C3D12;
        color: #F5F0DC;
        font-family: 'Press Start 2P', monospace;
        overflow-x: hidden;
      }
      body::after {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(
          0deg, transparent, transparent 2px,
          rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 3px
        );
        pointer-events: none;
        z-index: 9000;
      }
      #root { min-height: 100vh; }

      @keyframes bob {
        0%,100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
      }
      @keyframes glow {
        0%,100% { text-shadow: 3px 3px 0 #1C3D12, 6px 6px 0 #000; }
        50%      { text-shadow: 3px 3px 0 #1C3D12, 6px 6px 0 #000, 0 0 24px #E2A820, 0 0 48px #E2A820; }
      }
      @keyframes blink  { 50% { opacity: 0; } }
      @keyframes float  {
        0%,100% { transform: translateY(0) rotate(-1deg); }
        50%     { transform: translateY(-12px) rotate(1deg); }
      }
      @keyframes marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .tc-btn {
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      .tc-btn:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
